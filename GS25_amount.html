<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>GS25 기준외 품의금액 현황</title>
<meta name="theme-color" content="#0F4C9A">
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:'Apple SD Gothic Neo','Malgun Gothic','Noto Sans KR',sans-serif}
body{background:#F3F4F6;min-height:100vh}
.hd{background:#0F4C9A;padding:14px 16px;position:sticky;top:0;z-index:10}
.hd-title{color:#fff;font-size:15px;font-weight:800;letter-spacing:-.3px}
.hd-sub{color:rgba(255,255,255,.65);font-size:11px;margin-top:2px}
.hd-stats{display:flex;gap:8px;margin-top:10px}
.stat{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.2);border-radius:8px;padding:6px 10px;text-align:center;flex:1}
.stat-n{color:#fff;font-size:16px;font-weight:800;line-height:1}
.stat-l{color:rgba(255,255,255,.6);font-size:10px;margin-top:2px}
.wrap{padding:12px 12px 40px;max-width:600px;margin:0 auto}
.box{background:#fff;border-radius:12px;border:1px solid #E5E7EB;overflow:hidden;margin-bottom:10px}
.box-hd{background:#1E3A5F;padding:10px 14px;display:flex;align-items:center;justify-content:space-between}
.box-hd-title{color:#fff;font-size:12px;font-weight:700;letter-spacing:.5px}
.box-hd-total{color:#fff;font-size:13px;font-weight:800}
.srow{display:flex;align-items:center;padding:9px 14px;border-bottom:1px solid #F3F4F6;cursor:pointer;transition:background .12s;gap:4px}
.srow:last-child{border-bottom:none}
.srow:hover{background:#F8FAFF}
.srow:active{background:#EFF6FF}
.s-no{font-size:11px;font-weight:700;color:#9CA3AF;width:22px;flex-shrink:0}
.s-name{font-size:13px;font-weight:700;text-decoration:line-through;color:#6B7280;flex:1;padding:0 6px}
.s-amt{font-size:13px;font-weight:800;color:#0F4C9A;white-space:nowrap}
.s-amt.none{color:#D1D5DB;font-weight:400;font-size:12px}
.s-chv{font-size:9px;color:#9CA3AF;margin-left:4px;transition:transform .2s;flex-shrink:0}
.s-chv.open{transform:rotate(180deg)}
.cbadge{background:#1E3A5F;color:#fff;font-size:9px;font-weight:700;padding:1px 5px;border-radius:3px;margin-left:5px;vertical-align:middle;text-decoration:none;display:inline-block}
.det{display:none;border-top:1px solid #F3F4F6;background:#FAFAFA}
.det.open{display:block}
.det-hd{display:flex;align-items:center;gap:10px;padding:12px 14px}
.d-icon{width:38px;height:38px;border-radius:9px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:11px;font-weight:800;flex-shrink:0}
.d-name{font-size:13px;font-weight:800;color:#111827}
.d-meta{font-size:11px;color:#6B7280;margin-top:1px}
.det-body{padding:0 14px 12px}
.det-items{border:1px solid #EBEBEB;border-radius:8px;overflow:hidden;background:#fff;margin-bottom:8px}
.det-item{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;border-bottom:1px solid #F3F4F6}
.det-item:last-child{border-bottom:none}
.det-item-l{font-size:12px;color:#374151;flex:1;padding-right:10px;line-height:1.4}
.det-item-a{font-size:12px;font-weight:700;color:#111827;white-space:nowrap}
.det-total{display:flex;justify-content:space-between;align-items:center;background:#EFF6FF;border-radius:8px;padding:9px 12px}
.det-total-l{font-size:12px;font-weight:700;color:#1E40AF}
.det-total-a{font-size:17px;font-weight:800;color:#0F4C9A;letter-spacing:-.5px}
.no-amt{font-size:12px;color:#9CA3AF;text-align:center;padding:14px 0;background:#fff;border-radius:8px;border:1px solid #EBEBEB}
</style>
</head>
<body>
<div class="hd">
  <div class="hd-title">GS25 기준외 품의금액 현황</div>
  <div class="hd-sub">2026년 3월 오픈 점포 · 담당: 백운호</div>
  <div class="hd-stats" id="stats"></div>
</div>
<div class="wrap">
  <div class="box">
    <div class="box-hd">
      <span class="box-hd-title">점포별 기준외 금액</span>
      <span class="box-hd-total" id="grand-total"></span>
    </div>
    <div id="list"></div>
  </div>
</div>
<script>
var STORES=[
  {no:1,name:"세종카페거리",start:"2026/01/20",end:"2026/01/28",items:[{l:"무허가간판",a:399000},{l:"실외기갤러리",a:1200000},{l:"외부테라스",a:2303000},{l:"외부어닝",a:1540000}]},
  {no:2,name:"광주양산센터",start:"2026/02/27",end:"2026/03/10",items:[{l:"어닝천막",a:1299000},{l:"외부등",a:158000}]},
  {no:3,name:"뉴한서대스타",start:"2026/03/03",end:"2026/03/11",items:[{l:"데크철거 및 설치",a:6400000},{l:"측면간판(무허가)",a:2400000}]},
  {no:4,name:"아산음봉신휴",start:"2026/03/04",end:"2026/03/13",items:[{l:"에코장비 교체 슬림형>일반형",a:2000000},{l:"상부장",a:991000},{l:"택배기전열 재설치",a:105000},{l:"DVR 3대 추가",a:130000},{l:"원목테이블",a:179000},{l:"스탠딩간판",a:103000}]},
  {no:5,name:"문지프리미엄",start:"2026/03/03",end:"2026/03/12",items:[{l:"어닝천막",a:2074000},{l:"외부등",a:267000},{l:"외부전열",a:150000},{l:"겸용평대",a:1720000}]},
  {no:6,name:"유성포레나",start:"2026/03/04",end:"2026/03/27",items:[{l:"어닝천막",a:400000},{l:"무허가 간판 및 백판넬설치",a:1058000}]},
  {no:7,name:"순천신대본",start:"2026/03/08",end:"2026/03/20",items:[{l:"조적벽 철거",a:11278000},{l:"출입문 계단",a:1234000},{l:"어닝 신설",a:1826000}]},
  {no:8,name:"LG기술연구원구동",start:"2026/03/09",end:"2026/03/19",items:[]},
  {no:9,name:"정읍수성주공",start:"2026/03/11",end:"2026/03/23",items:[{l:"돌출간판",a:643000},{l:"무허가창고 설치",a:700000}]},
  {no:10,name:"광주아펠리스",start:"2026/03/12",end:"2026/03/21",items:[]},
  {no:11,name:"군산골드스타",start:"2026/03/11",end:"2026/03/26",items:[{l:"부데크 보수",a:1077000},{l:"노후도장/외부등기구",a:2083000},{l:"측면돌출간판",a:817000}]},
  {no:12,name:"예산내포엘리움",start:"2026/03/16",end:"2026/03/25",items:[{l:"어닝천막 및 비가림막",a:2475000},{l:"소방수신기 이설",a:750000}]},
  {no:13,name:"천안신부중앙",start:"2026/03/14",end:"2026/03/25",items:[{l:"외부데크 철거",a:1050000},{l:"64지구내 전열 및 앵글설치",a:500000}]},
  {no:14,name:"서천장항",start:"2026/03/15",end:"2026/03/25",items:[{l:"어닝천막",a:1058000},{l:"외부등 및 전열",a:148000},{l:"WIC1D 추가",a:1400000},{l:"시식강화",a:1400000}]},
  {no:15,name:"세종새롬하늘",start:"2026/03/21",end:"2026/03/30",items:[{l:"간판백판넬",a:556000},{l:"추가 체크판슬로프",a:241000}]},
  {no:16,name:"옥계프리미엄",start:"2026/03/16",end:"2026/03/25",items:[{l:"어닝천막",a:792000},{l:"외부등 및 외부전열",a:450000},{l:"시식강화",a:1505000},{l:"냉장겸용",a:1720000}]},
  {no:17,name:"아산모종한성펠",start:"2026/03/17",end:"2026/03/26",items:[{l:"전면어닝",a:1661000},{l:"전면데크",a:1106000},{l:"간판백판",a:1286000},{l:"외부등 외",a:1160000}]},
  {no:18,name:"군산아너스빌",start:"2026/03/21",end:"2026/03/30",items:[{l:"어닝천막 및 외부등 설치",a:1500000},{l:"백판간판",a:1036000},{l:"RIC 추가",a:850000}]},
  {no:19,name:"광주우산한국",start:"2026/03/16",end:"2026/03/26",items:[{l:"어닝",a:921000},{l:"외부등",a:121000}]},
  {no:20,name:"화순모아엘가",start:"2026/03/21",end:"2026/03/30",items:[]},
  {no:21,name:"계룡산단",start:"2026/03/22",end:"2026/03/30",items:[{l:"지주간판",a:2167000},{l:"유도간판",a:396000},{l:"배관",a:250000}]}
];
var COLORS=["#0F4C9A","#0D7377","#7C3AED","#BE185D","#B45309","#0F766E","#1D4ED8","#92400E","#065F46","#831843","#1E3A5F","#3730A3","#7F1D1D","#0369A1","#4D7C0F","#6D28D9","#0F4C9A","#0D7377","#7C3AED","#BE185D","#B45309"];
function comma(n){return n.toLocaleString("ko-KR");}
function tot(s){return s.items.reduce(function(a,i){return a+i.a;},0);}
var grand=STORES.reduce(function(a,s){return a+tot(s);},0);
var withAmt=STORES.filter(function(s){return s.items.length>0;}).length;
var noAmt=STORES.filter(function(s){return s.items.length===0;}).length;
document.getElementById("grand-total").textContent=comma(grand)+"원";
document.getElementById("stats").innerHTML='<div class="stat"><div class="stat-n">'+Math.round(grand/1000).toLocaleString()+'천</div><div class="stat-l">전체 합계</div></div><div class="stat"><div class="stat-n">21</div><div class="stat-l">전체 점포</div></div><div class="stat"><div class="stat-n">'+withAmt+'</div><div class="stat-l">금액 입력</div></div><div class="stat"><div class="stat-n">'+noAmt+'</div><div class="stat-l">미입력</div></div>';
var listEl=document.getElementById("list");
var html="";
for(var i=0;i<STORES.length;i++){
  var s=STORES[i];
  var t=tot(s);
  var col=COLORS[i%COLORS.length];
  var itemRows="";
  if(s.items.length===0){
    itemRows='<div class="no-amt">기준외 품의금액 없음</div>';
  } else {
    var rows="";
    for(var j=0;j<s.items.length;j++){rows+='<div class="det-item"><span class="det-item-l">'+s.items[j].l+'</span><span class="det-item-a">'+comma(s.items[j].a)+'원</span></div>';}
    itemRows='<div class="det-items">'+rows+'</div><div class="det-total"><span class="det-total-l">합 계</span><span class="det-total-a">'+comma(t)+'원</span></div>';
  }
  html+='<div class="srow" data-idx="'+i+'">'
    +'<span class="s-no" style="pointer-events:none">'+("0"+s.no).slice(-2)+'</span>'
    +'<span class="s-name" style="pointer-events:none">'+s.name+'<span class="cbadge">완료</span></span>'
    +'<span class="s-amt'+(t===0?" none":"")+'" style="pointer-events:none">'+(t>0?comma(t)+"원":"미입력")+'</span>'
    +'<span class="s-chv" id="chv-'+i+'" style="pointer-events:none">&#9660;</span>'
    +'</div>'
    +'<div class="det" id="det-'+i+'">'
    +'<div class="det-hd"><div class="d-icon" style="background:'+col+'">'+("0"+s.no).slice(-2)+'</div>'
    +'<div><div class="d-name">'+s.name+'</div><div class="d-meta">착공 '+s.start+' &rarr; 준공 '+s.end+'</div></div></div>'
    +'<div class="det-body">'+itemRows+'</div></div>';
}
listEl.innerHTML=html;
listEl.addEventListener("click",function(e){
  var row=e.target;
  while(row&&!row.dataset.idx){row=row.parentElement;}
  if(!row||row.dataset.idx===undefined)return;
  var idx=row.dataset.idx;
  var det=document.getElementById("det-"+idx);
  var chv=document.getElementById("chv-"+idx);
  var isOpen=det.classList.contains("open");
  var allDets=document.querySelectorAll(".det.open");
  var allChvs=document.querySelectorAll(".s-chv.open");
  for(var i=0;i<allDets.length;i++)allDets[i].classList.remove("open");
  for(var i=0;i<allChvs.length;i++)allChvs[i].classList.remove("open");
  if(!isOpen){det.classList.add("open");chv.classList.add("open");}
});
</script>
</body>
</html>
